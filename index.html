<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ESP32 Verkehrssteuerung</title>
<style>
  body {
    font-family: sans-serif;
    text-align: center;
    padding: 20px;
    background: #222;
    color: #eee;
    margin: 0;
  }
  h1 { font-size: 1.5em; }
  button {
    font-size: 1.6em;
    padding: 25px 50px;
    margin: 10px;
    border-radius: 12px;
    border: 3px solid transparent;
    color: white;
    cursor: pointer;
    box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    transition: transform 0.1s, border 0.2s, box-shadow 0.2s, opacity 0.2s;
    min-width: 220px;
    opacity: 0.6;
  }
  button:active { transform: scale(0.95); }
  button:disabled { cursor: not-allowed; opacity: 0.35 !important; }
  .green   { background: #28a745; }
  .red     { background: #dc3545; }
  .off     { background: #555; }
  .connect { background: #0d6efd; opacity: 1; }
  .forget  { background: #888; font-size: 0.9em; padding: 10px 20px; opacity: 1; }

  #buttons button.active {
    opacity: 1;
    border: 3px solid #ffc107;
    box-shadow: 0 0 20px #ffc107, 0 4px 6px rgba(0,0,0,0.3);
    transform: scale(1.05);
  }

  #status {
    font-weight: bold;
    padding: 12px;
    margin: 10px;
    border-radius: 8px;
    background: #333;
  }

  #linkStatus {
    display: none;
    max-width: 420px;
    margin: 12px auto;
    padding: 14px 16px;
    background: #2a2a2a;
    border-radius: 10px;
    text-align: left;
    border: 2px solid #0d6efd;
  }
  #linkStatus.online  { border-color: #28a745; }
  #linkStatus.offline { border-color: #dc3545; }
  #linkStatus.waiting { border-color: #ffc107; }
  #version { font-size: 0.45em; color: #888; font-weight: normal; }
  #linkStatus h2 {
    margin: 0 0 10px;
    font-size: 1em;
    text-align: center;
  }
  #linkBars {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 5px;
    height: 36px;
    margin: 10px 0;
  }
  #linkBars span {
    width: 14px;
    border-radius: 3px 3px 0 0;
    background: #444;
    transition: background 0.3s, height 0.3s;
  }
  #linkBars span:nth-child(1) { height: 8px; }
  #linkBars span:nth-child(2) { height: 14px; }
  #linkBars span:nth-child(3) { height: 20px; }
  #linkBars span:nth-child(4) { height: 26px; }
  #linkBars span:nth-child(5) { height: 32px; }
  #linkBars span.on { background: #28a745; }
  #linkBars span.on.warn { background: #ffc107; }
  #linkBars span.on.bad  { background: #dc3545; }
  #linkText {
    text-align: center;
    font-size: 0.95em;
    color: #adb5bd;
  }
  #linkRssi {
    text-align: center;
    font-family: monospace;
    font-size: 1.1em;
    margin-top: 4px;
    color: #eee;
  }

  #schedule {
    display: none;
    max-width: 420px;
    margin: 16px auto;
    padding: 16px;
    background: #2a2a2a;
    border-radius: 10px;
    text-align: left;
    font-size: 0.95em;
  }
  #schedule h2 {
    margin: 0 0 12px;
    font-size: 1.1em;
    text-align: center;
  }
  #schedule label {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }
  #schedule .times {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 8px;
  }
  #schedule .times label {
    flex-direction: column;
    align-items: center;
    margin: 0;
  }
  #schedule input[type="time"],
  #schedule select {
    background: #111;
    color: #eee;
    border: 1px solid #555;
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 1em;
  }
  #schedule .section {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid #444;
  }
  #schedule .section:first-of-type {
    margin-top: 0;
    padding-top: 0;
    border-top: none;
  }
  #scheduleHint, #nightHint {
    margin-top: 10px;
    text-align: center;
    color: #adb5bd;
    font-size: 0.85em;
  }

  #log {
    white-space: pre;
    text-align: left;
    font-family: monospace;
    background: #111;
    padding: 10px;
    border-radius: 8px;
    margin-top: 20px;
    max-height: 250px;
    overflow-y: auto;
    font-size: 0.85em;
    line-height: 1.4;
  }
</style>
</head>
<body>

<h1>🚦 Verkehrssteuerung <span id="version">GUI v2</span></h1>
<div id="status">⏳ Wird geladen...</div>

<div id="linkStatus">
  <h2>📡 Empfänger-Signal</h2>
  <div id="linkBars" aria-hidden="true">
    <span></span><span></span><span></span><span></span><span></span>
  </div>
  <div id="linkRssi">— dBm</div>
  <div id="linkText">Warte auf Messung…</div>
</div>

<button id="connect" class="connect">🔌 Mit ESP32 verbinden</button>
<button id="forget" class="forget">🗑️ Verbindung vergessen</button>

<div id="schedule">
  <h2>⏰ Zeitschaltung</h2>

  <div class="section">
    <label>
      <input type="checkbox" id="nightEnabled">
      Nacht-Ausschaltung aktiv
    </label>
    <div class="times">
      <label>
        Aus ab
        <input type="time" id="nightStart" value="20:00">
      </label>
      <label>
        Morgens ab (Mo–Fr)
        <input type="time" id="nightEnd" value="05:00">
      </label>
    </div>
    <label>
      Morgens automatisch
      <select id="morningMode">
        <option value="A1">🟢 Grün (Anliefern)</option>
        <option value="A0">🔴 Rot (Stopp)</option>
      </select>
    </label>
    <div id="nightHint">Nachts: Lampen aus. Werktags morgens automatisch Grün oder Rot.</div>
  </div>

  <div class="section">
    <label>
      <input type="checkbox" id="blockWeekends" checked>
      Wochenende (Sa/So): Lampe gesperrt
    </label>
    <div id="scheduleHint">Am Samstag und Sonntag bleibt die Lampe aus — kein Einschalten.</div>
  </div>
</div>

<div id="buttons" style="display:none"></div>
<div id="log"></div>

<script>
const BUTTONS = [
  { label: "🚛 Anliefern",          cmd: "A1", cls: "green", blockAtNight: true  },
  { label: "🛑 Anlieferung Stopp",  cmd: "A0", cls: "red",   blockAtNight: true  },
  { label: "⚫ Lampen aus",         cmd: "XX", cls: "off",   blockAtNight: false }
];

const KEEPALIVE_MS = 10000;
const SCHEDULE_CHECK_MS = 30000;
const STORAGE_KEY = "esp32_night_schedule";

let port = null;
let writer = null;
let reading = false;
let keepaliveTimer = null;
let scheduleTimer = null;
let nightModeActive = false;
let weekendBlockActive = false;
let wasNightMode = false;
let wasWeekendBlock = false;
let linkState = "waiting";
let lastLinkRssi = null;
let linkWatchdog = null;
let lastLampCmd = null;
const buttonEls = [];

const status     = document.getElementById('status');
const linkStatus = document.getElementById('linkStatus');
const linkBars   = document.querySelectorAll('#linkBars span');
const linkText   = document.getElementById('linkText');
const linkRssi   = document.getElementById('linkRssi');
const logEl      = document.getElementById('log');
const btnArea   = document.getElementById('buttons');
const btnConn   = document.getElementById('connect');
const btnForget = document.getElementById('forget');
const schedule  = document.getElementById('schedule');
const nightEnabled = document.getElementById('nightEnabled');
const nightStart   = document.getElementById('nightStart');
const nightEnd     = document.getElementById('nightEnd');
const blockWeekends = document.getElementById('blockWeekends');
const morningMode   = document.getElementById('morningMode');

function log(m) {
  const time = new Date().toLocaleTimeString();
  logEl.textContent = `[${time}] ${m}\n` + logEl.textContent;
}

function setStatus(text, color) {
  status.textContent = text;
  status.style.color = color || "#eee";
}

function signalInfo(rssi) {
  if (rssi >= -55) return { bars: 5, label: "Sehr stark",  cls: "" };
  if (rssi >= -65) return { bars: 4, label: "Stark",       cls: "" };
  if (rssi >= -75) return { bars: 3, label: "Mittel",      cls: "warn" };
  if (rssi >= -85) return { bars: 2, label: "Schwach",     cls: "warn" };
  if (rssi >= -95) return { bars: 1, label: "Sehr schwach", cls: "bad" };
  return { bars: 0, label: "Kaum Signal", cls: "bad" };
}

function updateMainStatus() {
  const now = new Date();
  nightModeActive = isNightTime(now);
  weekendBlockActive = isWeekendBlock(now);

  buttonEls.forEach(({ el, blockAtNight }) => {
    el.disabled = blockAtNight && isControlBlocked();
  });

  if (nightModeActive) {
    setStatus("🌙 Nachtmodus — Lampen aus", "#6f42c1");
  } else if (weekendBlockActive) {
    setStatus("📅 Wochenende — Lampe gesperrt", "#fd7e14");
  } else if (writer) {
    if (linkState === "ok" && lastLinkRssi != null) {
      setStatus("✅ Verbunden | 📡 Empfänger OK (" + lastLinkRssi + " dBm)", "#28a745");
    } else if (linkState === "out") {
      setStatus("✅ Verbunden | 📡 Empfänger offline", "#ffc107");
    } else {
      setStatus("✅ Verbunden | 📡 Warte auf Signal…", "#28a745");
    }
  }
}

function clearLinkWatchdog() {
  if (linkWatchdog) { clearTimeout(linkWatchdog); linkWatchdog = null; }
}

function startLinkWatchdog() {
  clearLinkWatchdog();
  linkWatchdog = setTimeout(() => {
    if (linkState !== "waiting" || !writer) return;
    linkStatus.className = "waiting";
    linkText.textContent = "Keine Signal-Daten — Sender & Empfänger neu flashen?";
    linkText.style.color = "#ffc107";
    log("⚠️ Kein LINK vom Sender — neue Firmware auf beiden ESP32?");
    updateMainStatus();
  }, 25000);
}

function setLinkSignal(rssi) {
  const wasOut = linkState === "out";
  linkState = "ok";
  lastLinkRssi = rssi;
  linkStatus.className = "online";
  const info = signalInfo(rssi);
  linkBars.forEach((bar, i) => {
    const active = i < info.bars;
    bar.className = active ? "on" + (info.cls ? " " + info.cls : "") : "";
  });
  linkRssi.textContent = rssi + " dBm";
  linkText.textContent = info.label + " — Empfänger erreichbar";
  linkText.style.color = info.cls === "bad" ? "#dc3545" : info.cls === "warn" ? "#ffc107" : "#28a745";
  updateMainStatus();
  restoreLampIfNeeded(wasOut);
}

async function restoreLampIfNeeded(wasOut) {
  if (!wasOut || !lastLampCmd || !writer) return;
  if (isControlBlocked() && lastLampCmd !== "XX") return;
  log("🔄 Empfänger wieder da — Lampe: " + lastLampCmd);
  if (lastLampCmd === "XX") {
    await sendRaw("XX", false);
    setActiveButton(offButtonEl());
  } else if (lastLampCmd === "A1") {
    await sendRaw("A1", false);
    setActiveButton(greenButtonEl());
  } else if (lastLampCmd === "A0") {
    await sendRaw("A0", false);
    setActiveButton(redButtonEl());
  }
}

function setLinkOffline() {
  linkState = "out";
  lastLinkRssi = null;
  linkStatus.className = "offline";
  linkBars.forEach(bar => { bar.className = ""; });
  linkRssi.textContent = "— dBm";
  linkText.textContent = "Empfänger nicht erreichbar";
  linkText.style.color = "#dc3545";
  updateMainStatus();
}

function setLinkWaiting() {
  linkState = "waiting";
  lastLinkRssi = null;
  linkStatus.className = "waiting";
  linkBars.forEach(bar => { bar.className = ""; });
  linkRssi.textContent = "— dBm";
  linkText.textContent = "Warte auf Messung…";
  linkText.style.color = "#adb5bd";
  updateMainStatus();
}

function handleSerialLine(line) {
  const linkMatch = line.match(/^LINK:(OK|OUT)(?:;(-?\d+))?$/);
  if (linkMatch) {
    clearLinkWatchdog();
    if (linkMatch[1] === "OK" && linkMatch[2] != null) {
      log("📡 Signal: " + linkMatch[2] + " dBm");
      setLinkSignal(Number(linkMatch[2]));
    } else {
      log("📡 Empfänger offline");
      setLinkOffline();
    }
    return true;
  }
  return false;
}

function setActiveButton(activeEl) {
  document.querySelectorAll('#buttons button').forEach(btn => btn.classList.remove('active'));
  if (activeEl) activeEl.classList.add('active');
}

function loadScheduleSettings() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
    nightEnabled.checked = saved.enabled !== false;
    blockWeekends.checked = saved.blockWeekends !== false;
    nightStart.value = saved.start || "20:00";
    nightEnd.value = saved.end || "05:00";
    morningMode.value = saved.morningMode === "A0" ? "A0" : "A1";
  } catch (e) {
    nightStart.value = "20:00";
    nightEnd.value = "05:00";
    blockWeekends.checked = true;
    morningMode.value = "A1";
  }
}

function saveScheduleSettings() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    enabled: nightEnabled.checked,
    blockWeekends: blockWeekends.checked,
    start: nightStart.value,
    end: nightEnd.value,
    morningMode: morningMode.value
  }));
}

function parseTimeHHMM(value) {
  const [h, m] = value.split(":").map(Number);
  return h * 60 + m;
}

function isNightTime(now) {
  if (!nightEnabled.checked) return false;
  const mins = now.getHours() * 60 + now.getMinutes();
  const start = parseTimeHHMM(nightStart.value);
  const end = parseTimeHHMM(nightEnd.value);
  if (start === end) return true;
  if (start < end) return mins >= start && mins < end;
  return mins >= start || mins < end;
}

function isWeekendBlock(now) {
  if (!blockWeekends.checked) return false;
  const day = now.getDay();
  return day === 0 || day === 6;
}

function isControlBlocked() {
  return nightModeActive || weekendBlockActive;
}

function greenButtonEl() {
  return buttonEls.find(b => b.cmd === "A1")?.el || null;
}

function redButtonEl() {
  return buttonEls.find(b => b.cmd === "A0")?.el || null;
}

function offButtonEl() {
  return buttonEls.find(b => b.cmd === "XX")?.el || null;
}

function updateScheduleUI() {
  updateMainStatus();
}

async function sendRaw(cmd, logSend = true) {
  if (!writer) return false;
  try {
    await writer.write(new TextEncoder().encode(cmd + "\n"));
    if (logSend) log("→ " + cmd);
    return true;
  } catch (e) {
    log("Sendefehler: " + e.message);
    setStatus("⚠️ Verbindung verloren", "#ffc107");
    return false;
  }
}

async function send(cmd, buttonEl) {
  if (!writer) { log("❌ Erst verbinden!"); return; }
  if (isControlBlocked() && cmd !== "XX") {
    if (weekendBlockActive) log("📅 Wochenende — Befehl blockiert");
    else log("🌙 Nachtmodus — Befehl blockiert");
    return;
  }
  const ok = await sendRaw(cmd);
  if (ok) {
    if (cmd === "A1" || cmd === "A0" || cmd === "XX") lastLampCmd = cmd;
    if (buttonEl) setActiveButton(buttonEl);
  }
}

async function applyMorningState() {
  const cmd = morningMode.value === "A0" ? "A0" : "A1";
  const label = cmd === "A1" ? "Grün (Anliefern)" : "Rot (Stopp)";
  log("☀️ Morgen — automatisch " + label);
  const ok = await sendRaw(cmd);
  if (ok) {
    lastLampCmd = cmd;
    setActiveButton(cmd === "A1" ? greenButtonEl() : redButtonEl());
  }
  return ok;
}

async function sendKeepalive() {
  await sendRaw("HB", false);
}

async function runScheduleCheck() {
  const now = new Date();
  const night = isNightTime(now);
  const weekend = isWeekendBlock(now);

  updateScheduleUI();
  if (!writer) return;

  if (night) {
    if (!wasNightMode) {
      log("🌙 Nachtmodus beginnt — Lampen aus");
      await sendRaw("XX");
      lastLampCmd = "XX";
      setActiveButton(offButtonEl());
    } else {
      await sendRaw("XX", false);
    }
  } else if (weekend) {
    if (!wasWeekendBlock) {
      log("📅 Wochenende — Lampen aus");
      await sendRaw("XX");
      lastLampCmd = "XX";
      setActiveButton(offButtonEl());
    } else {
      await sendRaw("XX", false);
    }
  } else {
    if (wasNightMode && !night) {
      await applyMorningState();
    }
  }

  wasNightMode = night;
  wasWeekendBlock = weekend;
}

function startBackgroundTasks() {
  stopBackgroundTasks();
  const now = new Date();
  wasNightMode = isNightTime(now);
  wasWeekendBlock = isWeekendBlock(now);
  sendKeepalive();
  runScheduleCheck();
  keepaliveTimer = setInterval(sendKeepalive, KEEPALIVE_MS);
  scheduleTimer = setInterval(runScheduleCheck, SCHEDULE_CHECK_MS);
}

function stopBackgroundTasks() {
  if (keepaliveTimer) { clearInterval(keepaliveTimer); keepaliveTimer = null; }
  if (scheduleTimer) { clearInterval(scheduleTimer); scheduleTimer = null; }
  wasNightMode = false;
  wasWeekendBlock = false;
  nightModeActive = false;
  weekendBlockActive = false;
  linkStatus.style.display = "none";
  clearLinkWatchdog();
  setLinkWaiting();
}

async function applyInitialDayState() {
  const now = new Date();
  if (isNightTime(now) || isWeekendBlock(now)) {
    await sendRaw("XX");
    lastLampCmd = "XX";
    setActiveButton(offButtonEl());
  } else {
    await applyMorningState();
  }
}

async function connect(p) {
  try {
    port = p;
    await port.open({ baudRate: 115200 });
    writer = port.writable.getWriter();
    btnConn.style.display = "none";
    btnArea.style.display = "block";
    schedule.style.display = "block";
    linkStatus.style.display = "block";
    setLinkWaiting();
    startLinkWatchdog();
    log("✓ Verbunden! (GUI v2 — Empfänger-Signal aktiv)");
    updateScheduleUI();
    readLoop();
    await applyInitialDayState();
    startBackgroundTasks();
  } catch (e) {
    log("❌ Fehler: " + e.message);
    setStatus("❌ Verbindungsfehler — bitte erneut versuchen", "#dc3545");
    btnConn.style.display = "inline-block";
  }
}

window.addEventListener('load', async () => {
  loadScheduleSettings();

  [nightEnabled, nightStart, nightEnd, blockWeekends, morningMode].forEach(el => {
    el.addEventListener("change", () => {
      saveScheduleSettings();
      if (!writer) return;
      if (el === morningMode && !isControlBlocked()) applyMorningState();
      else runScheduleCheck();
    });
  });

  if (!('serial' in navigator)) {
    setStatus("❌ Browser unterstützt kein Web Serial (nur Chrome/Edge)", "#dc3545");
    btnConn.style.display = "none";
    btnForget.style.display = "none";
    return;
  }

  const ports = await navigator.serial.getPorts();
  if (ports.length > 0) {
    log("🔄 Vorher freigegebener Port gefunden, verbinde automatisch...");
    setStatus("🔄 Verbinde automatisch...", "#0d6efd");
    await connect(ports[0]);
  } else {
    setStatus("ℹ️ Bitte einmalig auf 'Verbinden' klicken", "#ffc107");
    log("Erste Verwendung — bitte Verbinden klicken.");
  }
});

btnConn.onclick = async () => {
  try {
    const p = await navigator.serial.requestPort();
    await connect(p);
  } catch (e) {
    log("Abgebrochen oder Fehler: " + e.message);
  }
};

btnForget.onclick = async () => {
  try {
    stopBackgroundTasks();
    if (writer) { try { writer.releaseLock(); } catch (e) {} writer = null; }
    if (port) {
      try { await port.close(); } catch (e) {}
      try { await port.forget(); } catch (e) {}
      port = null;
    }
    const ports = await navigator.serial.getPorts();
    for (const p of ports) { try { await p.forget(); } catch (e) {} }
    log("🗑️ Berechtigung entfernt. Seite wird neu geladen...");
    setTimeout(() => location.reload(), 800);
  } catch (e) {
    log("Fehler beim Vergessen: " + e.message);
  }
};

async function readLoop() {
  if (reading) return;
  reading = true;
  const reader = port.readable.getReader();
  const dec = new TextDecoder();
  let buffer = "";
  try {
    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buffer += dec.decode(value, { stream: true });
      let nl;
      while ((nl = buffer.indexOf("\n")) >= 0) {
        const line = buffer.slice(0, nl).replace(/\r$/, "").trim();
        buffer = buffer.slice(nl + 1);
        if (line && !handleSerialLine(line)) log("← " + line);
      }
    }
  } catch (e) {
    log("Lesefehler: " + e.message);
    setStatus("⚠️ Verbindung unterbrochen", "#ffc107");
    stopBackgroundTasks();
  } finally {
    try { reader.releaseLock(); } catch (e) {}
    reading = false;
  }
}

BUTTONS.forEach(b => {
  const el = document.createElement('button');
  el.textContent = b.label;
  el.className = b.cls;
  el.onclick = () => send(b.cmd, el);
  btnArea.appendChild(el);
  buttonEls.push({ el, cmd: b.cmd, blockAtNight: b.blockAtNight });
});
</script>

</body>
</html>
